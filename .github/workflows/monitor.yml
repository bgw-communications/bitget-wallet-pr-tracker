name: Update PR Monitor

on:
  workflow_dispatch:
  schedule:
    # 09:00 Singapore time = 01:00 UTC
    - cron: "0 1 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run monitor
        env:
          QTD_START: "2026-04-01"
          MAX_PER_FEED: "80"
          FETCH_BYLINES: "1"
          MAX_BYLINE_FETCHES: "120"
        run: python run.py
      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update PR monitor data"
          file_pattern: data/*.json
